<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>404夏祭り</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    .festival-shell {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #festival-frame {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #000;
    }

    .sound-start {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px;
      background:
        radial-gradient(
          circle at center,
          rgba(15, 45, 75, 0.92),
          rgba(0, 5, 12, 0.98)
        );

      transition:
        opacity 0.6s ease,
        visibility 0.6s ease;
    }

    .sound-start.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .sound-panel {
      width: min(390px, 90vw);
      padding: 34px 26px;

      text-align: center;
      color: #eaf7ff;

      border: 1px solid rgba(135, 215, 255, 0.35);
      border-radius: 20px;

      background: rgba(4, 15, 28, 0.82);
      box-shadow:
        0 0 25px rgba(80, 190, 255, 0.14),
        inset 0 0 30px rgba(50, 140, 220, 0.06);

      backdrop-filter: blur(12px);
    }

    .sound-code {
      margin: 0 0 14px;

      color: rgba(155, 220, 255, 0.7);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
    }

    .sound-panel h1 {
      margin: 0 0 14px;
      font-size: 30px;
      letter-spacing: 0.08em;
    }

    .sound-panel p {
      margin: 0 0 26px;
      color: rgba(220, 240, 255, 0.72);
      font-size: 14px;
      line-height: 1.8;
    }

    #sound-start-button {
      padding: 13px 24px;

      color: #f2fbff;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.08em;

      border: 1px solid rgba(140, 220, 255, 0.55);
      border-radius: 13px;

      background:
        linear-gradient(
          135deg,
          rgba(34, 118, 170, 0.8),
          rgba(48, 65, 145, 0.85)
        );

      cursor: pointer;
    }

    #sound-start-button:hover {
      box-shadow: 0 0 22px rgba(95, 205, 255, 0.28);
    }

    .sound-control {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 1000;

      width: 44px;
      height: 44px;

      color: #dff6ff;
      font-size: 19px;

      border: 1px solid rgba(130, 215, 255, 0.32);
      border-radius: 50%;

      background: rgba(3, 17, 30, 0.74);
      backdrop-filter: blur(8px);

      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="festival-shell">

   <iframe
  id="festival-frame"
  name="festival-frame"
  src="home.html"
  title="404夏祭り"
></iframe>

  </div>

  <audio
    id="festival-bgm"
    loop
    preload="auto"
  >
    <source
      src="images/river.mp3"
      type="audio/mpeg"
    >
  </audio>

  <div
    id="sound-start"
    class="sound-start"
  >
    <div class="sound-panel">

      <p class="sound-code">
        404 AUDIO CONNECTION
      </p>

      <h1>404夏祭り</h1>

      <p>
        音の流れる夏祭りへ接続します。<br>
        画面を開いたまま、祭りを巡ってください。
      </p>

      <button
        id="sound-start-button"
        type="button"
      >
        ♪ 夏祭りへ入る
      </button>

    </div>
  </div>

  <button
    id="sound-control"
    class="sound-control"
    type="button"
    aria-label="BGMを切り替える"
  >
    ♪
  </button>

  <script>
    const bgm =
      document.getElementById("festival-bgm");

    const startScreen =
      document.getElementById("sound-start");

    const startButton =
      document.getElementById("sound-start-button");

    const soundControl =
      document.getElementById("sound-control");

    bgm.volume = 0.15;

    async function startFestival() {
      try {
        await bgm.play();

        startScreen.classList.add("hidden");
        soundControl.textContent = "♪";
      } catch (error) {
        console.error("BGMを開始できませんでした", error);
      }
    }

    startButton.addEventListener(
      "click",
      startFestival
    );

    soundControl.addEventListener("click", async () => {
      if (bgm.paused) {
        try {
          await bgm.play();
          soundControl.textContent = "♪";
        } catch (error) {
          console.error(
            "BGMを再開できませんでした",
            error
          );
        }
      } else {
        bgm.pause();
        soundControl.textContent = "×";
      }
    });
  </script>

</body>
</html>
