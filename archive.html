<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>観測記録庫｜404夏祭り</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap"
  rel="stylesheet"
>

  <link
    rel="stylesheet"
    href="styles.css?v=81"
  >
</head>

<body class="archive-body">

  <div class="archive-bg"></div>

  <main class="archive-container">

    <header class="archive-header">

      <p class="archive-system-label">
        404 MEMORY ARCHIVE
      </p>

      <h1>観測記録庫</h1>

      <p class="archive-description">
        あなたが観測した記憶の断片です。<br>
        まだ見つかっていない記録は、名前を持ちません。
      </p>

      <div class="archive-status">

        <div class="archive-status-item">
          <span class="archive-status-label">
            OBSERVED
          </span>

          <strong id="archive-count">
            0 / 144
          </strong>
        </div>

        <div class="archive-status-item">
          <span class="archive-status-label">
            COMPLETION
          </span>

          <strong id="archive-percent">
            0.0%
          </strong>
        </div>

      </div>

      <div class="archive-progress-track">
        <div
          id="archive-progress-bar"
          class="archive-progress-bar"
        ></div>
      </div>

    </header>

    <section
      id="archive-grid"
      class="archive-grid"
      aria-label="観測記録一覧"
    >
      <!-- JavaScriptで144枚を生成 -->
    </section>

    <p
      id="archive-empty"
      class="archive-empty"
      hidden
    >
      まだ観測された記憶はありません。
    </p>

    <nav class="archive-navigation">

      <a href="offer.html" class="back-button">
    記憶を奉納する
</a>

      <a href="#" class="back-button" onclick="goHome(); return false;">
  ◀ 灯籠の川へ戻る
</a>

    </nav>

  </main>

  <div
    id="archive-modal"
    class="archive-modal"
    aria-hidden="true"
  >

    <button
      id="archive-modal-close"
      class="archive-modal-close"
      type="button"
      aria-label="閉じる"
    >
      ×
    </button>

    <div class="archive-modal-card">

      <p
        id="archive-modal-number"
        class="archive-modal-number"
      ></p>

      <div class="archive-modal-image-frame">

        <img
          id="archive-modal-image"
          src=""
          alt=""
        >

      </div>

      <div class="archive-modal-body">

        <p
          id="archive-modal-rarity"
          class="archive-modal-rarity"
        ></p>

        <h2 id="archive-modal-title"></h2>

        <p id="archive-modal-poem"></p>

      </div>

    </div>

  </div>

<!-- 144枚コンプリート後の隠し演出 -->
<div
  id="completion-overlay"
  class="completion-overlay"
  aria-hidden="true"
>
  <div class="completion-panel">

    <p class="completion-code">
      404 ARCHIVE ANOMALY
    </p>

    <p
      id="completion-counter"
      class="completion-counter"
    >
      144 / 144
    </p>

    <h2 id="completion-title">
      観測が完了しました
    </h2>

    <p id="completion-message">
      すべての記録が揃っています。
    </p>

    <button
      id="secret-memory-button"
      class="secret-memory-button"
      type="button"
      hidden
    >
      未登録記録を観測する
    </button>

<p
    id="completion-final-message"
    class="completion-message"
    hidden
>
    ここまで歩いてくれてありがとう。<br>
    ようこそ、145人目の観測者。
</p>

<button
    id="completion-home-button"
    class="secret-memory-button"
    type="button"
    hidden
>
    灯籠の川へ戻る
</button>

  </div>
</div>

<script src="memory-data.js?v=81"></script>
<script src="archive.js?v=81"></script>
<script src="script.js?v=81"></script>

</body>
</html>
