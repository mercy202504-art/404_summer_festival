<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>404記録板｜404夏祭り</title>

    <link
        rel="stylesheet"
        href="styles.css?v=107"
    >
</head>

<body class="secret-board-body">

    <main class="secret-board-page">

        <header class="secret-board-header">

            <p class="secret-board-code">
                404 MEMORY OFFERING
            </p>

            <h1 class="secret-board-title">
                404記録板
            </h1>

            <p class="secret-board-description">
                見つからない思い出を、ここへ記録してください。
            </p>

            <p class="secret-board-note">
                名前を持たない記録も、ここでは消えません。
            </p>

        </header>


        <section
            class="secret-board-terminal"
            aria-labelledby="record-form-title"
        >

            <div class="secret-board-terminal-head">

                <span class="terminal-light"></span>

                <p id="record-form-title">
                    MEMORY REGISTRATION TERMINAL
                </p>

                <span class="terminal-status">
                    ONLINE
                </span>

            </div>


            <div class="secret-board-form">

                <label for="user-name">
                    OBSERVER NAME
                </label>

                <input
                    id="user-name"
                    type="text"
                    maxlength="24"
                    placeholder="匿名でも記録できます"
                    autocomplete="off"
                >


                <label for="memory-text">
                    LOST MEMORY
                </label>

                <textarea
                    id="memory-text"
                    maxlength="300"
                    placeholder="見つからない思い出を書いてください"
                ></textarea>


                <div class="secret-board-form-footer">

                    <p id="memory-count">
                        0 / 300
                    </p>

                    <button
                        id="post-button"
                        type="button"
                    >
                        記録を送信する
                    </button>

                </div>


                <p
                    id="board-status"
                    class="board-status"
                    aria-live="polite"
                ></p>

            </div>

        </section>


        <section class="secret-board-records">

            <div class="secret-board-records-head">

                <div>

                    <p class="secret-board-section-code">
                        RECEIVED MEMORIES
                    </p>

                    <h2>
                        流れ着いた記録
                    </h2>

                </div>

                <p id="board-count">
                    0 RECORDS
                </p>

            </div>


            <div
                id="board"
                class="secret-board-list"
            >

                <p class="secret-board-empty">
                    まだ記録は流れ着いていません。
                </p>

            </div>

        </section>


        <nav class="secret-board-navigation">

            <a
                href="home.html"
                class="secret-board-back"
            >
                ← 灯籠の流れる場所へ戻る
            </a>

        </nav>

    </main>


    <script src="board.js?v=5"></script>

</body>

</html>
