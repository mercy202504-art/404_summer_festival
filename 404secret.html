<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>404記録板</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="offer-body">

<audio id="festival-bgm" loop preload="auto">
  <source src="images/river.mp3" type="audio/mpeg">
</audio>

    <div class="offer-container">
      <h1>404記録板</h1>

      <p class="offer-text">見つからない思い出を記録してください</p>

      <input id="user-name" type="text" placeholder="投稿者名（匿名可）" />

      <textarea
        id="memory-text"
        placeholder="見つからない思い出を書いてください"
      ></textarea>

      <button id="post-button">記録する</button>

      <div id="board"></div>

      <a href="index.html" class="back-button"> ← 灯籠の流れる場所へ戻る </a>
    </div>

    <script src="board.js"></script>
  </body>
</html>
